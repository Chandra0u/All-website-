<!DOCTYPE html>
<html>
<head>
  <title>All Website Search 🔍</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a18cd1);
      color: white;
    }

    h1 {
      color: yellow;
      text-shadow: 2px 2px 5px black;
    }

    h2 {
      color: cyan;
    }

    form {
      margin: 50px auto;
      padding: 20px;
      width: 350px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 15px;
    }

    input {
      padding: 10px;
      width: 220px;
      font-size: 16px;
      border: 2px solid blue;
      border-radius: 8px;
    }

    button {
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
      background: orange;
      color: white;
      border: none;
      border-radius: 8px;
    }

    button:hover {
      background: red;
    }
  </style>
</head>

<body>

  <h1>All Website Search 🔍</h1>

  <h2>YouTube Search</h2>
  <form action="https://www.youtube.com/results" method="GET">
    <input
      type="text"
      placeholder="Search YouTube..."
      name="search_query"
      required>
    <button type="submit">Search</button>
  </form>

  <h2>Google Search</h2>
  <form action="https://www.google.com/search" method="GET">
    <input
      type="text"
      placeholder="Search Google..."
      name="q"
      required>
    <button type="submit">Search</button>
  </form>

  <h2>Wikipedia Search</h2>
  <form action="https://en.wikipedia.org/w/index.php" method="GET">
    <input
      type="text"
      placeholder="Search Wikipedia..."
      name="search"
      required>
    <button type="submit">Search</button>
  </form>

</body>
</html>
